<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ad</title>
  <style>html,body{margin:0;padding:0;overflow:hidden;background:transparent}</style>
</head>
<body>
  <!--
    카카오 애드핏 격리 프레임.
    ExternalAdSlot 이 <iframe src="/adfit.html?unit=...&w=...&h=..."> 로 띄운다.
    각 프레임이 독립 문서라 ba.min.js 가 매번 새로 로드 → 동적/지연추가 슬롯도 항상 렌더.
    (부모 페이지에 ins 를 직접 넣으면 ba.min.js 1회 스캔 한계로 빈칸 발생)
    같은 도메인(creaite.net) 파일이라 애드핏 도메인 인증에도 문제없음.
  -->
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var unit = p.get('unit') || '';
      var w = p.get('w') || '300';
      var h = p.get('h') || '250';
      if (!unit) return;
      var ins = document.createElement('ins');
      ins.className = 'kakao_ad_area';
      ins.style.display = 'none';
      ins.setAttribute('data-ad-unit', unit);
      ins.setAttribute('data-ad-width', w);
      ins.setAttribute('data-ad-height', h);
      document.body.appendChild(ins);
      var s = document.createElement('script');
      s.async = true;
      s.src = '//t1.daumcdn.net/kas/static/ba.min.js';
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
